{% extends 'store/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body text-center p-4">
                <h4 class="card-title text-danger mb-3">O'chirishni tasdiqlaysizmi?</h4>
                <p class="card-text mb-4">
                    <strong>"{{ product.name }}"</strong> mahsulotini rostdan ham o'chirmoqchimisiz? Bu amalni ortga qaytarib bo'lmaydi.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'product_list' %}" class="btn btn-secondary px-4">Yo'q, bekor qilish</a>
                        <button type="submit" class="btn btn-danger px-4">Ha, o'chirish</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
